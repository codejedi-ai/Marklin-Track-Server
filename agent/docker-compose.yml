# Full CMDB stack: Neo4j graph DB + the FastAPI agent.
# Run:  docker compose up --build
#   API:           http://localhost:8000/docs
#   Neo4j Browser: http://localhost:7474  (bolt on 7687)
services:
  neo4j:
    image: neo4j:5.23-community
    container_name: cmdb-neo4j
    ports:
      - "7474:7474"   # HTTP / Neo4j Browser
      - "7687:7687"   # Bolt (driver connection)
    environment:
      NEO4J_AUTH: "neo4j/cmdb-dev-password"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: cmdb-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "cmdb-dev-password"
      # Provide your OpenRouter key here (or mount token.txt); needed only for /ask.
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      ASK_MODEL: "${ASK_MODEL:-openai/gpt-4o-mini}"
    # Sample data is read at /ingest/samples from the repo's input_data folder.
    volumes:
      - ../input_data:/input_data:ro
      - ../token.txt:/token.txt:ro
      # Mount the normalization rules so the agent / API can edit them at
      # runtime and the changes persist to the host file.
      - ./ingest/normalization.json:/app/ingest/normalization.json
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
